[build]
builder = "NIXPACKS"
# NOTE: this buildCommand overrides the nixpacks [phases.build] cmds, so the
# `playwright install` here MUST download the browser or it's missing at runtime.
# `--with-deps` installs Chromium's OS libraries via apt (the nixpacks base is
# Ubuntu) into standard paths; the nix-store libs in [phases.setup] are NOT
# visible to Playwright's downloaded chrome-headless-shell binary
# (error: libglib-2.0.so.0: cannot open shared object file).
buildCommand = "cd client && npm ci --no-workspaces && npm run build && rm -rf ../server/static && mv dist ../server/static && cd ../server && pip install -r requirements.txt && playwright install --with-deps chromium"

[deploy]
# On startup: (1) alembic upgrade head runs to build schema from migrations,
# then (2) uvicorn starts the app. SEED_ON_EMPTY=1 → after migrating, the app
# seeds the demo dataset when the DB is empty. Railway's filesystem is ephemeral
# (no volume), so each deploy starts empty and comes up freshly migrated + seeded.
# Drop SEED_ON_EMPTY flag once a persistent volume/Postgres is added and real
# data must survive deploys.
#
# NON-secret config (URLs, CORS origins, paths, model names, flags) lives in
# committed config files — config.py and each frontend's src/config/appUrls.ts —
# NOT in dashboard variables. CORS origins for all deployed apps are baked into
# config.py (_PROD_CORS_ORIGINS), so no CORS variable is needed.
#
# The ONLY values that remain deployment secrets (must not be committed — they
# would leak in git history) are credentials. Provide them via a gitignored
# server/.env (config.py loads it) or, if that isn't viable on the host, the
# minimum necessary secret store:
#   REQUIRE_AUTH=1      closes the API — /api/* (except /api/auth/* and /health)
#                       then requires a logged-in user, else 401. OFF by default;
#                       enable only once every served frontend authenticates.
#   JWT_SECRET_KEY      random string used to sign login JWTs
#   SECRET_KEY          random string (token/HMAC signing)
#   ANTHROPIC_API_KEY   for the AI / assistant endpoints
# The standalone MCP server (Claude Desktop) authenticates with OPA_USERNAME +
# OPA_PASSWORD (a real OPA login). See MCP.md.
startCommand = "cd server && alembic upgrade head && SEED_ON_EMPTY=1 uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'"
